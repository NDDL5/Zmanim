<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>מחשבון Risk/Reward לסחיקה</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-secondary: rgba(255, 255, 255, 0.95);
            --text-primary: #333;
            --text-secondary: #667eea;
            --input-bg: #f8f9fa;
            --input-border: #e9ecef;
            --box-bg: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        body.dark-mode {
            --bg-primary: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --bg-secondary: #0f3460;
            --text-primary: #eee;
            --text-secondary: #7dd3fc;
            --input-bg: #1e293b;
            --input-border: #334155;
            --box-bg: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 0.8rem;
            direction: rtl;
            transition: background 0.3s;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            transition: background 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .theme-toggle {
            background: transparent;
            border: 2px solid var(--text-secondary);
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 0;
        }

        .theme-toggle:hover {
            background: var(--text-secondary);
            color: var(--bg-secondary);
            transform: scale(1.05);
        }

        .currency-select {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .currency-select label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .currency-select select {
            background: var(--input-bg);
            border: 2px solid var(--input-border);
            color: var(--text-primary);
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: border 0.2s;
        }

        .currency-select select:focus {
            outline: none;
            border-color: var(--text-secondary);
        }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 600px) {
            .input-section {
                grid-template-columns: 1fr;
                gap: 0.6rem;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
            font-weight: 600;
        }

        .input-group input {
            background: var(--input-bg);
            border: 2px solid var(--input-border);
            color: var(--text-primary);
            padding: 0.6rem;
            border-radius: 6px;
            font-size: 15px;
            transition: border 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--text-secondary);
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 600px) {
            .results-grid {
                grid-template-columns: 1fr;
                gap: 0.8rem;
            }
        }

        .result-column {
            border-top: 3px solid var(--text-secondary);
            padding-top: 1rem;
        }

        .result-column h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 1rem;
            text-align: center;
            color: var(--text-primary);
        }

        .result-box {
            background: var(--box-bg);
            padding: 0.8rem;
            border-radius: 6px;
            margin-bottom: 0.8rem;
            transition: background 0.3s;
        }

        .result-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
            font-weight: 600;
        }

        .result-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .result-value.success {
            color: #10b981;
        }

        .result-value.danger {
            color: #ef4444;
        }

        button {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 6px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .button-group {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💹 Risk/Reward</h1>
            <div class="header-controls">
                <button class="theme-toggle" id="themeToggle" title="החלף מצב">🌙</button>
                <div class="currency-select">
                    <label>מטבע:</label>
                    <select id="currency">
                        <option value="USD">💵 דולר</option>
                        <option value="ILS">₪ שקל</option>
                        <option value="EUR">€ יורו</option>
                        <option value="GBP">£ פאונד</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="input-section">
            <div class="input-group">
                <label>מחיר קניה</label>
                <input type="number" id="entryPrice" placeholder="0.00" step="0.01">
            </div>
            <div class="input-group">
                <label>Stop Loss</label>
                <input type="number" id="stopLoss" placeholder="0.00" step="0.01">
            </div>
            <div class="input-group">
                <label>סכום סיכון</label>
                <input type="number" id="riskAmount" placeholder="0.00" step="0.01">
            </div>
            <div class="input-group">
                <label>מכפיל (R)</label>
                <input type="number" id="rMultiplier" placeholder="2.0" step="0.1" min="0">
            </div>
        </div>

        <div class="results-grid">
            <div class="result-column">
                <h3>🔽 למטה</h3>
                <div class="result-box">
                    <div class="result-label">כמות</div>
                    <div class="result-value" id="sharesDown">0</div>
                </div>
                <div class="result-box">
                    <div class="result-label">עלויות</div>
                    <div class="result-value" id="costDown">0</div>
                </div>
                <div class="result-box">
                    <div class="result-label">רווח</div>
                    <div class="result-value success" id="profitDown">0</div>
                </div>
                <div class="result-box">
                    <div class="result-label">הפסד</div>
                    <div class="result-value danger" id="lossDown">0</div>
                </div>
            </div>

            <div class="result-column">
                <h3>🔼 למעלה</h3>
                <div class="result-box">
                    <div class="result-label">כמות</div>
                    <div class="result-value" id="sharesUp">0</div>
                </div>
                <div class="result-box">
                    <div class="result-label">עלויות</div>
                    <div class="result-value" id="costUp">0</div>
                </div>
                <div class="result-box">
                    <div class="result-label">רווח</div>
                    <div class="result-value success" id="profitUp">0</div>
                </div>
                <div class="result-box">
                    <div class="result-label">הפסד</div>
                    <div class="result-value danger" id="lossUp">0</div>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button id="resetBtn">ניקוי הכל</button>
        </div>

        <div class="footer">
            ✅ הנתונים נשמרים בטלפון שלך
        </div>
    </div>

    <script>
        const STORAGE_KEYS = {
            entryPrice: 'rrc_entry',
            stopLoss: 'rrc_stop',
            riskAmount: 'rrc_risk',
            rMultiplier: 'rrc_r',
            currency: 'rrc_curr',
            darkMode: 'rrc_dark'
        };

        const inputs = {
            entry: document.getElementById('entryPrice'),
            stop: document.getElementById('stopLoss'),
            risk: document.getElementById('riskAmount'),
            rMult: document.getElementById('rMultiplier'),
            curr: document.getElementById('currency')
        };

        const outputs = {
            sharesDown: document.getElementById('sharesDown'),
            sharesUp: document.getElementById('sharesUp'),
            profitDown: document.getElementById('profitDown'),
            profitUp: document.getElementById('profitUp'),
            costDown: document.getElementById('costDown'),
            costUp: document.getElementById('costUp'),
            lossDown: document.getElementById('lossDown'),
            lossUp: document.getElementById('lossUp')
        };

        const symbols = { USD: '$', ILS: '₪', EUR: '€', GBP: '£' };
        const themeToggle = document.getElementById('themeToggle');

        function loadTheme() {
            const isDark = localStorage.getItem(STORAGE_KEYS.darkMode) === 'true';
            if (isDark) {
                document.body.classList.add('dark-mode');
                themeToggle.textContent = '☀️';
            }
        }

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem(STORAGE_KEYS.darkMode, isDark);
            themeToggle.textContent = isDark ? '☀️' : '🌙';
        }

        function load() {
            inputs.entry.value = localStorage.getItem(STORAGE_KEYS.entryPrice) || '';
            inputs.stop.value = localStorage.getItem(STORAGE_KEYS.stopLoss) || '';
            inputs.risk.value = localStorage.getItem(STORAGE_KEYS.riskAmount) || '';
            inputs.rMult.value = localStorage.getItem(STORAGE_KEYS.rMultiplier) || '';
            inputs.curr.value = localStorage.getItem(STORAGE_KEYS.currency) || 'USD';
        }

        function save() {
            localStorage.setItem(STORAGE_KEYS.entryPrice, inputs.entry.value);
            localStorage.setItem(STORAGE_KEYS.stopLoss, inputs.stop.value);
            localStorage.setItem(STORAGE_KEYS.riskAmount, inputs.risk.value);
            localStorage.setItem(STORAGE_KEYS.rMultiplier, inputs.rMult.value);
            localStorage.setItem(STORAGE_KEYS.currency, inputs.curr.value);
        }

        function calc() {
            const e = parseFloat(inputs.entry.value) || 0;
            const s = parseFloat(inputs.stop.value) || 0;
            const r = parseFloat(inputs.risk.value) || 0;
            const m = parseFloat(inputs.rMult.value) || 0;
            const sym = symbols[inputs.curr.value];

            const rp = Math.abs(e - s);
            const se = rp > 0 ? r / rp : 0;

            if (e > 0 && rp > 0 && m > 0) {
                const sd = Math.floor(se);
                const cd = sd * e;
                const ld = sd * Math.abs(s - e);
                const pd = ld * m;

                outputs.sharesDown.textContent = sd;
                outputs.costDown.textContent = `${cd.toFixed(2)} ${sym}`;
                outputs.lossDown.textContent = `${ld.toFixed(2)} ${sym}`;
                outputs.profitDown.textContent = `${pd.toFixed(2)} ${sym}`;

                const su = Math.ceil(se);
                const cu = su * e;
                const lu = su * Math.abs(s - e);
                const pu = lu * m;

                outputs.sharesUp.textContent = su;
                outputs.costUp.textContent = `${cu.toFixed(2)} ${sym}`;
                outputs.lossUp.textContent = `${lu.toFixed(2)} ${sym}`;
                outputs.profitUp.textContent = `${pu.toFixed(2)} ${sym}`;
            } else {
                Object.values(outputs).forEach(o => o.textContent = '0');
            }
        }

        inputs.entry.addEventListener('input', () => { save(); calc(); });
        inputs.stop.addEventListener('input', () => { save(); calc(); });
        inputs.risk.addEventListener('input', () => { save(); calc(); });
        inputs.rMult.addEventListener('input', () => { save(); calc(); });
        inputs.curr.addEventListener('change', () => { save(); calc(); });
        themeToggle.addEventListener('click', toggleTheme);

        document.getElementById('resetBtn').addEventListener('click', () => {
            Object.values(inputs).forEach(inp => inp.value = '');
            inputs.curr.value = 'USD';
            localStorage.removeItem(STORAGE_KEYS.entryPrice);
            localStorage.removeItem(STORAGE_KEYS.stopLoss);
            localStorage.removeItem(STORAGE_KEYS.riskAmount);
            localStorage.removeItem(STORAGE_KEYS.rMultiplier);
            calc();
        });

        loadTheme();
        load();
        calc();
    </script>
</body>
</html>
